# HTTP → HTTPS redirect
server {
  listen 80;
  server_name jinyverse.com www.jinyverse.com admin.jinyverse.com api.jinyverse.com;
  return 301 https://$host$request_uri;
}

# Public site
server {
  listen 443 ssl;
  server_name jinyverse.com www.jinyverse.com;

  ssl_certificate /etc/letsencrypt/live/jinyverse.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jinyverse.com/privkey.pem;

  location / {
    proxy_pass http://external:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Admin site
server {
  listen 443 ssl;
  server_name admin.jinyverse.com;

  ssl_certificate /etc/letsencrypt/live/admin.jinyverse.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.jinyverse.com/privkey.pem;

  location / {
    proxy_pass http://internal:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# API
server {
  listen 443 ssl;
  server_name api.jinyverse.com;

  ssl_certificate /etc/letsencrypt/live/api.jinyverse.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.jinyverse.com/privkey.pem;

  client_max_body_size 25M;

  location / {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
