# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# ── Global Settings ──
server_tokens off;
access_log /var/log/nginx/site-access.log;
error_log /var/log/nginx/site-error.log;

# ── Scanner/Bot Blocking (shared map) ──
map $request_uri $is_scanner {
  default 0;
  ~*\.env                    1;
  ~*\.git                    1;
  ~*\.svn                    1;
  ~*\.htaccess               1;
  ~*\.htpasswd               1;
  ~*\.DS_Store               1;
  ~*wp-admin                 1;
  ~*wp-login                 1;
  ~*wp-content               1;
  ~*wp-includes              1;
  ~*wordpress                1;
  ~*phpMyAdmin               1;
  ~*phpmyadmin               1;
  ~*adminer                  1;
  ~*xmlrpc\.php              1;
  ~*\.php$                   1;
  ~*\.asp$                   1;
  ~*\.aspx$                  1;
  ~*\.jsp$                   1;
  ~*\.cgi$                   1;
  ~*cgi-bin                  1;
  ~*/config\.               1;
  ~*/backup                  1;
  ~*/debug                   1;
  ~*\.sql$                   1;
  ~*\.bak$                   1;
  ~*\.old$                   1;
  ~*\.orig$                  1;
  ~*\.zip$                   1;
  ~*\.tar\.gz$               1;
  ~*\.rar$                   1;
}

# HTTP → HTTPS redirect (with ACME challenge exception)
server {
  listen 80;
  server_name jinyverse.com www.jinyverse.com admin.jinyverse.com api.jinyverse.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Public site
server {
  listen 443 ssl;
  server_name jinyverse.com www.jinyverse.com;

  ssl_certificate /etc/letsencrypt/live/jinyverse.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jinyverse.com/privkey.pem;

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  client_max_body_size 25M;

  # Block scanners
  if ($is_scanner) { return 444; }

  # Login rate limit
  location /api/auth/login {
    limit_req zone=login burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://external:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API rate limit
  location /api/ {
    limit_req zone=api burst=50 nodelay;
    limit_req_status 429;
    proxy_pass http://external:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=general burst=40 nodelay;
    limit_req_status 429;
    proxy_pass http://external:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

