services:
  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile.jenkins
    container_name: jinyverse-jenkins
    # user: root (보안상 제거, 하위 경로 권한 조정 필요)
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
    name: jinyverse_jenkins_home
