services:
  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile.jenkins
    container_name: jinyverse-jenkins
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:8080'
      - '127.0.0.1:50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 300

volumes:
  jenkins_home:
    name: jinyverse_jenkins_home
