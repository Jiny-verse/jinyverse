services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: database
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jinyverse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ${POSTGRES_DATA_PATH:-postgres_data}:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend-runner
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jinyverse}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      FILE_STORAGE_BASE_PATH: /app/data/uploads
    volumes:
      - ${UPLOAD_DATA_PATH:-/srv/data/uploads}:/app/data/uploads
    depends_on:
      - postgres

  external:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: external-runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - backend

  internal:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: internal-runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - '3001:3001'
    depends_on:
      - backend

volumes:
  postgres_data:
