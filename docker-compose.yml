services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: database
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jinyverse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_PATH:-postgres_data}:/var/lib/postgresql/data
      - ./sql/migration:/docker-entrypoint-initdb.d
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - external
      - internal
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 100
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend-runner
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jinyverse}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FILE_STORAGE_BASE_PATH: /app/data/uploads
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USE_SMTP: ${MAIL_USE_SMTP}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JAVA_OPTS: "-Xmx384m -Xms128m"
    volumes:
      - ${UPLOAD_DATA_PATH:-/srv/data/uploads}:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.5'
          pids: 200

  external:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: external-runner
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - API_BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 100

  internal:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: internal-runner
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - API_BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 100

volumes:
  postgres_data:
  nginx_logs:
